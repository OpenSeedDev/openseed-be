    slice_id: "VS-006, VS-009, VS-018, VS-030, VS-055"
    stage: "pr_reconciliation"
    command: "GitHub PR commit history and Backend CI run history audit"
    symptom: "CI·리뷰·충돌 복구·승인 관찰 결과를 상태 파일에 기록할 때마다 새 Head가 만들어져 전체 CI가 다시 실행되고 기존 승인이 낡아졌다. 최근 기능 PR은 각각 Backend CI를 6~9회 실행했다."
    root_cause: "변하지 않는 구현 코드와 GitHub 런타임 관찰 상태를 같은 PR 브랜치에 저장했고, Backend CI가 변경 경로와 무관하게 ./gradlew clean test를 실행했다."
    resolution: "GitHub를 런타임 최종 기준으로 사용해 관찰 전용 Push와 작업별 완료 상태 PR을 중단하고, 변경 경로별 CI와 최종 Head CI 회수 방식으로 전환했다."
    prevention: "Merge Guard는 committed task readiness만 검사하고 GitHub required checks와 auto-merge가 live gate를 담당한다. synchronize 이벤트는 기존 auto-merge를 해제하며 경량 변경은 Java 전체 테스트를 건너뛴다."
