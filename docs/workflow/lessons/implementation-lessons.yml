    category: concurrency
    review_comment_id: null
    symptom: "동시 Refresh와 현재 로그아웃에서 로그아웃이 먼저 폐기해도 갱신 트랜잭션이 stale AuthSession을 활성으로 판단해 새 세션 1개를 남겼다."
    root_cause: "사용자 잠금 전에 AuthSession Entity를 조회해 영속성 컨텍스트에 보관했고, 잠금 후 같은 Entity 조회가 DB의 최신 폐기 상태를 다시 반영하지 않았다."
    fix: "잠금 전에는 사용자 ID만 스칼라로 조회하고 사용자 행 잠금 후 AuthSession Entity를 처음 조회하도록 변경했다."
    regression_test: "LogoutIntegrationTest.concurrentRefreshAndCurrentLogoutLeaveNoActiveFamilySession 및 사용자 잠금 기반 갱신·로그인 대 전체 로그아웃 테스트"
    applies_to: "잠금 전 후보 조회와 잠금 후 상태 재검증을 수행하는 모든 인증·지갑·투자 트랜잭션"
    recurrence_count: 1
