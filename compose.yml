services:
  postgres:
    image: postgres:17-alpine
    container_name: seedrank-postgres
    environment:
      POSTGRES_DB: seedrank
      POSTGRES_USER: seedrank
      POSTGRES_PASSWORD: local-password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - seedrank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedrank -d seedrank"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  seedrank-postgres-data: