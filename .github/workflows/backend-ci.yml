name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select test scope
        id: test-scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] ||
             [ -z "$BASE_SHA" ] ||
             [ -z "$HEAD_SHA" ] ||
             [[ "$BASE_SHA" =~ ^0+$ ]] ||
             ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null ||
             ! git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null; then
            SCOPE=full
          else
            SCOPE=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" |
              ruby .agents/skills/vertical-slice/scripts/select_backend_test_scope.rb)
          fi
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Selected backend test scope: $SCOPE"

      - name: Set up Java 21
        if: steps.test-scope.outputs.scope == 'full'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: steps.test-scope.outputs.scope == 'full'
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        if: steps.test-scope.outputs.scope == 'full'
        run: ./gradlew test --no-daemon

      - name: Skip backend tests for workflow-only changes
        if: steps.test-scope.outputs.scope == 'workflow-only'
        run: echo "Java source, tests, migrations, and Gradle inputs are unchanged."

      - name: Upload test report on failure
        if: failure() && steps.test-scope.outputs.scope == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore
          retention-days: 7
