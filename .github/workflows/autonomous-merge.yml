name: Autonomous Merge Approval

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [synchronize]
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'pado0711' &&
      github.event.comment.body == '/merge-approved'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate task PR and enable protected auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          APPROVED_HEAD=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefOid --jq '.headRefOid')
          IS_CROSS_REPOSITORY=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json isCrossRepository --jq '.isCrossRepository')
          HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefName --jq '.headRefName')
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json baseRefName --jq '.baseRefName')
          PR_BASE_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json baseRefOid --jq '.baseRefOid')
          if [ "$IS_CROSS_REPOSITORY" != "false" ]; then
            echo "Refusing a PR from a fork"
            exit 1
          fi
          if [ "$BASE_BRANCH" != "main" ]; then
            echo "Refusing a PR not targeting main"
            exit 1
          fi
          if [[ ! "$HEAD_BRANCH" =~ ^codex/(vs-[0-9]{3}|ops-[0-9]{2}|e2e-[0-9]{2})-[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Refusing a non-task branch: $HEAD_BRANCH"
            exit 1
          fi
          CURRENT_HEAD=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefOid --jq '.headRefOid')
          if [ "$APPROVED_HEAD" != "$CURRENT_HEAD" ]; then
            echo "The PR head changed while validating approval"
            exit 1
          fi
          LATEST_BASE_SHA=$(gh api "repos/$REPOSITORY/git/ref/heads/$BASE_BRANCH" --jq '.object.sha')
          CHECK_RUNS_FILE="$RUNNER_TEMP/current-head-check-runs.json"
          gh api "repos/$REPOSITORY/commits/$CURRENT_HEAD/check-runs?per_page=100" > "$CHECK_RUNS_FILE"
          ruby .agents/skills/vertical-slice/scripts/check_merge_approval_gate.rb \
            --pr-base-sha "$PR_BASE_SHA" \
            --latest-base-sha "$LATEST_BASE_SHA" \
            --check-runs-file "$CHECK_RUNS_FILE"
          gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --auto --merge

  invalidate-stale-auto-merge:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Disable auto-merge after a new push
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ ! "$HEAD_BRANCH" =~ ^codex/(vs-[0-9]{3}|ops-[0-9]{2}|e2e-[0-9]{2})-[a-z0-9][a-z0-9-]*$ ]]; then
            echo "No task auto-merge to invalidate"
            exit 0
          fi
          AUTO_MERGE_ENABLED=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [ "$AUTO_MERGE_ENABLED" = "true" ]; then
            gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --disable-auto
            echo "Disabled stale auto-merge; a fresh /merge-approved comment is required."
          else
            echo "Auto-merge is not enabled."
          fi

  invalidate-behind-auto-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Disable approvals whose base is no longer current
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          LATEST_MAIN_SHA: ${{ github.sha }}
        run: |
          gh pr list --repo "$REPOSITORY" --state open --limit 100 \
            --json number,headRefName,baseRefOid,autoMergeRequest \
            --jq '.[] | select(.autoMergeRequest != null) | @base64' |
          while read -r encoded; do
            [ -n "$encoded" ] || continue
            pr_json=$(printf '%s' "$encoded" | base64 --decode)
            number=$(printf '%s' "$pr_json" | jq -r '.number')
            head_branch=$(printf '%s' "$pr_json" | jq -r '.headRefName')
            base_sha=$(printf '%s' "$pr_json" | jq -r '.baseRefOid')
            if [[ "$head_branch" =~ ^codex/(vs-[0-9]{3}|ops-[0-9]{2}|e2e-[0-9]{2})-[a-z0-9][a-z0-9-]*$ ]] &&
               [ "$base_sha" != "$LATEST_MAIN_SHA" ]; then
              gh pr merge "$number" --repo "$REPOSITORY" --disable-auto
              echo "Disabled auto-merge for PR #$number because main advanced."
            fi
          done
