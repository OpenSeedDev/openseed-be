spring:
  application:
    name: seedrank-backend

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_READ_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:5000}

app:
  auth:
    jwt-secret: ${JWT_SECRET}
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
  ai:
    prompt-version: ${AI_IDEA_PROMPT_VERSION:idea-candidates-v1}
  company-verification:
    expires-in: ${COMPANY_VERIFICATION_EXPIRES_IN:PT30M}
    confirm-url: ${COMPANY_VERIFICATION_CONFIRM_URL:http://localhost:3000/company-verification/confirm}
    mail-from: ${MAIL_FROM:no-reply@seedrank.local}
