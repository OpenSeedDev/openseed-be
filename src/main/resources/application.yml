spring:
  application:
    name: seedrank-backend

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

app:
  auth:
    jwt-secret: ${JWT_SECRET}
    cookie-secure: ${AUTH_COOKIE_SECURE:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
